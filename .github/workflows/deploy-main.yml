name: Build and Deploy to IPFS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time; cancel in-flight if a new push arrives
concurrency:
  group: deploy-ipfs
  cancel-in-progress: true

# softprops/action-gh-release needs `contents: write`; the w3s-failure
# issue fallback needs `issues: write`.
permissions:
  contents: write
  issues: write

jobs:
  build-and-pin:
    runs-on: ubuntu-latest
    environment: production-frontend
    env:
      # The w3s secondary pin only runs when its secrets are provisioned.
      HAS_W3S: ${{ secrets.WEB3_STORAGE_PRINCIPAL != '' && secrets.WEB3_STORAGE_PROOF != '' }}
    outputs:
      cid: ${{ steps.pinata.outputs.cid }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      # Must match .bun-version exactly — the preinstall script
      # (scripts/check-runtime-versions.sh) hard-fails on any drift.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production bundle
        run: bunx nx build:production web

      # ── Pinata (primary, required) ─────────────────────────────────────
      - name: Pin to Pinata
        id: pinata
        run: .github/scripts/pin-to-pinata.sh
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          BUILD_DIR: apps/web/build
          PIN_NAME: "spxswap-${{ github.sha }}"

      # ── Verify + warm public gateways ───────────────────────────────────
      # Gates the release and the pin cleanup: if the new CID can't be served
      # publicly, the job fails and the previous pin stays live. Also pre-warms
      # gateway caches so the release links don't 504 on first click.
      - name: Verify deploy on public gateways
        run: .github/scripts/verify-ipfs-deploy.sh
        env:
          CID: ${{ steps.pinata.outputs.cid }}

      # ── web3.storage (secondary, best-effort) ──────────────────────────
      # Pinata is primary; w3s is redundancy. Skipped entirely when its
      # secrets aren't provisioned; if the pin fails, we continue (the
      # release still happens) and open an ops issue.
      - name: Pin to web3.storage (secondary)
        id: w3s
        if: env.HAS_W3S == 'true'
        continue-on-error: true
        run: .github/scripts/pin-to-web3storage.sh
        env:
          WEB3_STORAGE_PRINCIPAL: ${{ secrets.WEB3_STORAGE_PRINCIPAL }}
          WEB3_STORAGE_PROOF: ${{ secrets.WEB3_STORAGE_PROOF }}
          BUILD_DIR: apps/web/build
          EXPECTED_CID: ${{ steps.pinata.outputs.cid }}

      - name: Open issue on w3s pin failure
        if: steps.w3s.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "web3.storage secondary pin failed for ${GITHUB_SHA:0:7}" \
            --body "Pinata pin succeeded; w3s pin failed. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Deploy summary
        run: |
          CID="${{ steps.pinata.outputs.cid }}"
          W3S="${{ steps.w3s.outcome }}"
          echo "## IPFS Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**CID**: \`$CID\`" >> $GITHUB_STEP_SUMMARY
          echo "**Pinata**: pinned" >> $GITHUB_STEP_SUMMARY
          echo "**web3.storage**: $W3S" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Access the site**:" >> $GITHUB_STEP_SUMMARY
          echo "- https://ipfs.io/ipfs/$CID/" >> $GITHUB_STEP_SUMMARY
          echo "- https://$CID.ipfs.dweb.link/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Public gateways can 504 while their caches are cold — retry once or twice._" >> $GITHUB_STEP_SUMMARY

      # ── GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "ipfs-${{ github.run_number }}"
          name: "IPFS Deploy #${{ github.run_number }}"
          body: |
            **CID**: `${{ steps.pinata.outputs.cid }}`
            **Commit**: ${{ github.sha }}

            **Access the site**:
            - https://ipfs.io/ipfs/${{ steps.pinata.outputs.cid }}/
            - https://${{ steps.pinata.outputs.cid }}.ipfs.dweb.link/

            _Public gateways can 504 while their caches are cold — retry once or twice._
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Pinata housekeeping ─────────────────────────────────────────────
      # Runs last so old pins survive any failure above. Only touches pins
      # named like production deploys (never spxswap-testnet-*).
      - name: Unpin previous production deploys
        run: .github/scripts/cleanup-pinata-pins.sh
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          KEEP_CID: ${{ steps.pinata.outputs.cid }}
          PIN_NAME_REGEX: '^spxswap-[0-9a-f]{40}$'
